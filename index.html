<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Password Generator</title>
</head>
<body>

<div class="password-generator-container">

    <h1>Random Password Generator</h1>

    <div class="output-container">
        <input type="text" id="output" readonly placeholder="Generated Password">
        <i class="fa-regular fa-copy fa-2x"></i>
    </div>

    <h3>Password Length:</h3>
    <input type="number" id="password-length" min="4" max="128" value="16">

    <!-- OPTIONS -->
    <div class="options">
        <label><input type="checkbox" id="include-lowercase" checked> Include Lowercase</label>
        <label><input type="checkbox" id="include-uppercase" checked> Include Uppercase</label>
        <label><input type="checkbox" id="include-numbers" checked> Include Numbers</label>
        <label><input type="checkbox" id="include-symbols" checked> Include Symbols</label>
        <label><input type="checkbox" id="avoid-similar"> Avoid Similar Characters (l, 1, O)</label>
    </div>

    <!-- STRENGTH -->
    <div class="strength-container">
        <div class="strength-bar" id="strength-bar"></div>
    </div>
    <p id="strength-text">Strength: Weak</p>

    <button class="gen-btn">
        <i class="fa-solid fa-sync"></i> Generate
    </button>

</div>

<div class="message">Password copied to clipboard</div>

<script src="script.js"></script>
</body>
</html>
