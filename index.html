<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="style.css">
    <title>Random Password Generator</title>    
</head>
<body>

    <div class="password-generator-container">

        <h1>Random Password Generator</h1>

        <div class="output-container">

            <input type="text" name="output" id="output" readonly placeholder="Generated Password">
            <i class="fa-regular fa-copy fa-2x"></i>

        </div>
        <h3>Password Length:</h3>
        <input type="number" name="length" id="password-length" min="4" max="128" value="16">
        <button class="gen-btn"><i class="fa-solid fa-sync"></i>Generate</button>

    </div>

    <div class="message">Password copied to clipboard</div>
    <script src="script.js"></script>
</body>
</html>
